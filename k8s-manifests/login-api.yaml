apiVersion: v1
kind: Service
metadata:
  name: login-api
  namespace: apps-anchieta-mobile-ios
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: login-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-api
  namespace: apps-anchieta-mobile-ios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-api
  template:
    metadata:
      labels:
        app: login-api
    spec:
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: login-api
          image: 192.168.1.33:5000/anchieta-mobile-ios-repository/api-login:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom: { secretKeyRef: { name: login-api-secrets, key: db-url } }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: login-api-secrets, key: db-user } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: login-api-secrets, key: db-pass } }
            - name: KEYCLOAK_SERVER_URL
              value: "http://keycloak.infra.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "anchieta-mobile-ios-realm"
            - name: KEYCLOAK_CLIENT_ID
              value: "registration-api-client"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: login-api-secrets, key: keycloak-client-secret } }
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
            requests:
              memory: "256Mi"
